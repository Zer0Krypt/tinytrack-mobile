<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5b8ef0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TinyTrack">
  <title>TinyTrack</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/components.css">
</head>
<body>
  <div id="timer-banner" class="timer-banner hidden"></div>
  <div id="connectivity-indicator" class="conn-indicator offline"></div>

  <main id="tab-content" class="tab-content"></main>

  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-tab active" data-tab="log">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Log</span>
    </button>
    <button class="nav-tab" data-tab="history">
      <span class="nav-icon">📖</span>
      <span class="nav-label">History</span>
    </button>
    <button class="nav-tab" data-tab="insights">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Insights</span>
    </button>
    <button class="nav-tab" data-tab="settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <div id="sheet-container" class="hidden"></div>

  <script src="/js/constants.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/sync.js"></script>
  <script src="/js/timer.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/components/activity-grid.js"></script>
  <script src="/js/components/bottom-sheet.js"></script>
  <script src="/vendor/chartjs/chart.umd.js"></script>
  <script src="/js/components/charts.js"></script>
  <script src="/js/views/log.js"></script>
  <script src="/js/views/history.js"></script>
  <script src="/js/views/insights.js"></script>
  <script src="/js/views/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
